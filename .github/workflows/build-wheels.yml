name: Build Wheels

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install cibuildwheel
      run: python -m pip install cibuildwheel==2.16.2

    - name: Build wheels
      run: python -m cibuildwheel --output-dir wheelhouse
      env:
        # Build for Python 3.9, 3.10, 3.11, 3.12
        CIBW_BUILD: cp39-* cp310-* cp311-* cp312-*

        # Skip 32-bit builds and musl on Linux
        CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"

        # Use manylinux2014 for better compatibility
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux2014

        # Install build dependencies
        CIBW_BEFORE_BUILD: pip install nanobind scikit-build-core

        # Run tests after build
        CIBW_TEST_COMMAND: python -c "import libsqlglot; print('Import test passed')"

        # Compiler requirements for C++23
        CIBW_ENVIRONMENT_LINUX: CC=gcc-13 CXX=g++-13
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=11.0

    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-${{ matrix.os }}
        path: ./wheelhouse/*.whl

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
    - uses: actions/download-artifact@v4
      with:
        pattern: wheels-*
        path: dist
        merge-multiple: true

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
