# Docker Compose for Grammar Transpiler
# Multi-dialect parser generation with parallel builds
# All parsers generated with 100% automation (ANTLR → Lemon → C++)
#
# Usage:
#   docker-compose -f docker-compose.grammar-transpiler.yml up

version: '3.8'

services:
  # Extract grammar data and generate C++ LUT headers for ALL dialects
  transpiler:
    build:
      context: .
      dockerfile: Dockerfile.grammar-transpiler
    image: libsqlglot-transpiler:latest
    container_name: grammar-transpiler
    volumes:
      - ./generated:/workspace/generated
      - ./include:/workspace/include
      - ./scripts/antlr:/workspace/scripts/antlr
    environment:
      - PYTHONUNBUFFERED=1
    command: ["--help"]

  # Extract ALL dialects and generate unified headers (RECOMMENDED)
  extract-all:
    extends: transpiler
    container_name: transpiler-extract-all
    command:
      - --extract-all
      - --data-output-dir
      - /workspace/generated/grammar_data
      - --header-output-dir
      - /workspace/include/libsqlglot

  # Extract single dialect (for testing)
  mysql:
    extends: transpiler
    container_name: transpiler-mysql
    command:
      - --grammar
      - mysql
      - --extract-only

  # Extract single dialect (for testing)
  postgresql:
    extends: transpiler
    container_name: transpiler-postgresql
    command:
      - --grammar
      - postgresql
      - --extract-only

  # Extract single dialect (for testing)
  sqlite:
    extends: transpiler
    container_name: transpiler-sqlite
    command:
      - --grammar
      - sqlite
      - --extract-only

  # Generate keywords.h from all dialects
  keywords:
    extends: transpiler
    container_name: transpiler-keywords
    command:
      - --keywords-only
      - --keywords-output
      - /workspace/include/libsqlglot/keywords_generated.h

# ============================================================================
# Usage Examples:
# ============================================================================
#
# Extract ALL dialects and generate unified C++ headers (RECOMMENDED):
#   docker-compose -f docker-compose.grammar-transpiler.yml up extract-all
#
# Extract single dialect for testing:
#   docker-compose -f docker-compose.grammar-transpiler.yml up mysql
#
# Generate keywords.h only:
#   docker-compose -f docker-compose.grammar-transpiler.yml up keywords
#
# Clean up:
#   docker-compose -f docker-compose.grammar-transpiler.yml down
#
# View logs:
#   docker-compose -f docker-compose.grammar-transpiler.yml logs extract-all
#
# ============================================================================
